            <article class="contact active">

                <header>
                    <h2 class="h2 article-title">Contact</h2>
                </header>

                <section class="mapbox" data-mapbox>
                    <figure>
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7241.970010607878!2d67.04195953727343!3d24.83018639885959!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3eb33c3554f9a919%3A0x23a7c9bad457c7b9!2sPunjab%20Colony%2C%20Karachi%2C%20Karachi%20City%2C%20Sindh%2075600%2C%20Pakistan!5e0!3m2!1sen!2s!4v1708174558047!5m2!1sen!2s"
                            width="400" height="300" loading="lazy"></iframe>
                    </figure>
                </section>
                

                <section class="contact-form">

                    <h3 class="h3 form-title">Contact Form</h3>

                    <form action="#" class="form" data-form>

                        <div class="input-wrapper">
                            <input type="text" name="fullname" class="form-input" placeholder="Full name" required
                                data-form-input>

                            <input type="email" name="email" class="form-input" placeholder="Email address" required
                                data-form-input>
                        </div>

                        <textarea name="message" class="form-input" placeholder="Your Message" required
                            data-form-input></textarea>

                        <button class="form-btn" type="submit" disabled data-form-btn>
                            <ion-icon name="paper-plane"></ion-icon>
                            <span>Send Message</span>
                        </button>

                    </form>

                </section>

    <!-- <script src="../assets/js/script.js"></script> -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script>
        // element toggle function
        const elementToggleFunc = function (elem) { elem.classList.toggle("active"); }

        // sidebar variables
        const sidebar = document.querySelector("[data-sidebar]");
        const sidebarBtn = document.querySelector("[data-sidebar-btn]");

        // sidebar toggle functionality for mobile
        sidebarBtn.addEventListener("click", function () { elementToggleFunc(sidebar); });
        // contact form variables
        const form = document.querySelector("[data-form]");
        const formInputs = document.querySelectorAll("[data-form-input]");
        const formBtn = document.querySelector("[data-form-btn]");

        // add event to all form input field
        for (let i = 0; i < formInputs.length; i++) {
            formInputs[i].addEventListener("input", function () {

                // check form validation
                if (form.checkValidity()) {
                    formBtn.removeAttribute("disabled");
                } else {
                    formBtn.setAttribute("disabled", "");
                }

            });
        }
    </script>
